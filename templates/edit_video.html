{% extends "layout.html" %}
{% block content %}
<div class="h-full flex items-center justify-center p-4">
  <form method="POST" class="bg-white/4 border border-white/8 backdrop-blur-xl p-8 rounded-3xl w-full max-w-md flex flex-col gap-5 shadow-2xl animate__animated animate__fadeIn">
    <h2 class="text-2xl font-black text-center">Videoyu Düzenle ✏️</h2>
    <div class="rounded-2xl overflow-hidden bg-black max-h-48 flex items-center justify-center">
      <video src="{{ video.filename }}" class="max-h-48 object-contain" controls muted></video>
    </div>
    <select name="category" class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none text-gray-300 focus:border-blue-500 transition">
      {% for cat in ['Genel','Eğlence','Oyun','Spor','Müzik','Teknoloji','Haber'] %}
      <option value="{{ cat }}" {{ 'selected' if video.category == cat }}>{{ cat }}</option>
      {% endfor %}
    </select>
    <textarea name="caption" rows="3" placeholder="Açıklama…"
              class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none resize-none text-white placeholder-gray-500 focus:border-blue-500 transition">{{ video.caption }}</textarea>
    <div class="flex gap-3">
      <a href="{{ url_for('profile', username=current_user.username) }}" class="flex-1 py-3 rounded-2xl border border-white/15 font-bold text-center hover:bg-white/5 transition text-sm">İptal</a>
      <button type="submit" class="flex-1 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition text-sm">Kaydet</button>
    </div>
  </form>
</div>
{% endblock %}
