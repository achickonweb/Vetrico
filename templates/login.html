{% extends "layout.html" %}
{% block content %}
<div class="h-full flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute top-20 left-20 w-72 h-72 bg-purple-600/15 rounded-full blur-[100px] animate-pulse"></div>
  <div class="absolute bottom-20 right-20 w-72 h-72 bg-red-600/15 rounded-full blur-[100px] animate-pulse"></div>
  <form method="POST" class="bg-white/4 border border-white/8 backdrop-blur-xl p-10 rounded-3xl w-full max-w-sm flex flex-col gap-5 z-10 shadow-2xl animate__animated animate__fadeInUp">
    <div class="text-center mb-2">
      <div class="w-14 h-14 bg-gradient-to-tr from-red-600 to-purple-700 rounded-2xl flex items-center justify-center text-2xl font-black mx-auto mb-3">V</div>
      <h2 class="text-2xl font-black">Tekrar hoş geldin</h2>
      <p class="text-gray-500 text-sm mt-1">Vetrico'ya giriş yap</p>
    </div>
    <input type="text" name="username" placeholder="Kullanıcı adı" autocomplete="username"
           class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-red-500 transition text-white placeholder-gray-500" required>
    <input type="password" name="password" placeholder="Şifre" autocomplete="current-password"
           class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-red-500 transition text-white placeholder-gray-500" required>
    <button type="submit" class="bg-gradient-to-r from-red-600 to-purple-700 py-4 rounded-2xl font-black text-lg shadow-lg hover:scale-[1.02] transition active:scale-[0.98]">Giriş Yap</button>
    <p class="text-center text-sm text-gray-500">Hesabın yok mu? <a href="/register" class="text-white font-bold hover:text-red-400 transition">Kayıt Ol</a></p>
  </form>
</div>
{% endblock %}
