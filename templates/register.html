{% extends "layout.html" %}
{% block content %}
<div class="h-full flex items-center justify-center p-4 relative overflow-hidden">
  <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
    <div class="w-96 h-96 bg-blue-600/10 rounded-full blur-[130px] animate-pulse"></div>
  </div>
  <form method="POST" class="bg-white/4 border border-white/8 backdrop-blur-xl p-10 rounded-3xl w-full max-w-sm flex flex-col gap-5 z-10 shadow-2xl animate__animated animate__fadeInUp">
    <div class="text-center mb-2">
      <div class="w-14 h-14 bg-gradient-to-tr from-blue-600 to-cyan-500 rounded-2xl flex items-center justify-center text-2xl font-black mx-auto mb-3">V</div>
      <h2 class="text-2xl font-black">Katıl!</h2>
      <p class="text-gray-500 text-sm mt-1">Vetrico'da hesap oluştur</p>
    </div>
    <input type="text" name="username" placeholder="Kullanıcı adı" autocomplete="username"
           class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition text-white placeholder-gray-500" required>
    <input type="password" name="password" placeholder="Şifre" autocomplete="new-password"
           class="px-4 py-3.5 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-blue-500 transition text-white placeholder-gray-500" required>
    <button type="submit" class="bg-white text-black py-4 rounded-2xl font-black text-lg shadow-lg hover:scale-[1.02] transition active:scale-[0.98]">Hesap Oluştur</button>
    <p class="text-center text-sm text-gray-500">Zaten hesabın var mı? <a href="/login" class="text-white font-bold hover:text-blue-400 transition">Giriş Yap</a></p>
  </form>
</div>
{% endblock %}
